<!DOCTYPE html>
<html>

<head>
    <title>Checker</title>

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f4f4;
            font-family:Arial;
        }

        .container{
            background:white;
            padding:40px;
            width:450px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
            text-align:center;
        }

        h1{
            color:#243b55;
            margin-bottom:25px;
            font-size:45px;
        }

        textarea{
            width:100%;
            height:150px;
            padding:10px;
            border-radius:10px;
            border:1px solid gray;
            font-size:16px;
            resize:none;
        }

        .buttons{
            display:flex;
            justify-content:center;
            gap:15px;
            margin-top:20px;
        }

        button{
            padding:12px 25px;
            border:none;
            background:#243b55;
            color:white;
            font-size:18px;
            border-radius:10px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#141e30;
            transform:scale(1.05);
        }

        .home-btn{
            background:#555;
        }

        .home-btn:hover{
            background:#333;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Check Your Message</h1>

        <form action="/predict" method="POST">

            <textarea 
            name="message"
            placeholder="Enter your message here..."
            required></textarea>

            <div class="buttons">

                <button type="submit">
                    Check Now
                </button>

                <a href="/">
                    <button type="button" class="home-btn">
                        Home
                    </button>
                </a>

            </div>

        </form>

    </div>

    <script>

        const form = document.querySelector("form");
        const submitButton = document.querySelector("button");

        form.addEventListener("submit", () => {

            submitButton.innerHTML = "Checking...";
            submitButton.disabled = true;

        });

    </script>

</body>

</html>
